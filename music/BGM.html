<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>「尽生」金枠の陣・時間拡張音響（究極連携用ステルスBGM）</title>
    <style>
        /* iframe内での完全非表示・ステルス仕様 */
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
    </style>
</head>
<body>

<script>
let audioCtx = null;
let isPlaying = false;

// 全タイマー保持用
let timers = {};
let mainGain = null;
let filters = {};
let pipeOscs = [];

const etherealChords = [
    [261.63, 329.63, 392.00, 493.88], // Cmaj9
    [220.00, 261.63, 329.63, 392.00], // Am9
    [174.61, 218.27, 261.63, 349.23], // Fmaj9
    [196.00, 246.94, 293.66, 392.00]  // G6
];
const crystalNotes = [880.00, 987.77, 1046.50, 1174.66, 1318.51];
let chordIndex = 0;
let startTime = null; // 20秒周期のLFO時間基準用

// 1. DOMContentLoaded 発火時に自動的に AudioContext を生成・再生開始
document.addEventListener('DOMContentLoaded', () => {
    playAmbient();
});

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    mainGain = audioCtx.createGain();
    mainGain.gain.setValueAtTime(0.5, audioCtx.currentTime); 
    
    // フィルターを用途別に生成（高音のトゲを丸める制限）
    filters.pad = createFilter(320);
    filters.crystal = createFilter(1600);
    filters.clock = createFilter(350);      // 秒針をハッキリ突き抜けさせるため少し広域へ
    filters.bell = createFilter(220);       
    filters.nature = createFilter(1400);     
    filters.sea = createFilter(1200);        
    filters.pipe = createFilter(250);       
    
    mainGain.connect(audioCtx.destination);
}

function createFilter(freq) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.setValueAtTime(freq, audioCtx.currentTime);
    f.connect(mainGain);
    return f;
}

// 1. 空気の満ち引き（白金のエーテル・パッド）
function spawnEtherealWave() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    const currentChord = etherealChords[chordIndex];
    const duration = 24.0;
    const attack = 6.0;

    currentChord.forEach((freq) => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.03, now + attack);
        gainNode.gain.setValueAtTime(0.03, now + duration - 12.0);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.connect(gainNode);
        gainNode.connect(filters.pad);
        osc.start(now);
        osc.stop(now + duration);
    });
    chordIndex = (chordIndex + 1) % etherealChords.length;
    timers.wave = setTimeout(spawnEtherealWave, 24000 + Math.random() * 10000);
}

// 2. 結晶の雫（チリーン・ボリューム1.5倍据え置き）
function spawnCrystalDrop() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    const baseFreq = crystalNotes[Math.floor(Math.random() * crystalNotes.length)];
    
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(baseFreq, now);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(baseFreq * 1.414, now);
    
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.24, now + 0.15); 
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
    
    osc1.connect(gainNode);
    const overtoneGain = audioCtx.createGain();
    overtoneGain.gain.setValueAtTime(0.04, now);
    osc2.connect(overtoneGain);
    overtoneGain.connect(gainNode);
    
    gainNode.connect(filters.crystal);
    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 3.5);
    osc2.stop(now + 3.5);
    
    timers.crystal = setTimeout(spawnCrystalDrop, 15000 + Math.random() * 15000);
}

// 👑 3. 宿命の秒針（★20秒周期に時間拡張！10秒かけてゆっくり大きくなり、10秒かけて小さくなる極緩仕様）
function spawnClockTick() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'triangle'; 
    osc.frequency.setValueAtTime(145, now);
    
    // 経過時間から【20秒周期】のサイン波（0.0〜1.0）を計算[cite: 3]
    const elapsedSeconds = (Date.now() - startTime) / 1000;
    const lfoFactor = 0.5 + 0.5 * Math.sin((elapsedSeconds * Math.PI * 2) / 20); // 10から20秒へ拡張して緩やかに[cite: 3]
    
    // 最小音量を0.35、最大値を3.5倍（極大ゲイン）にする満ち引きロジック[cite: 3]
    const dynamicGain = 0.35 + (3.15 * lfoFactor);
    
    gainNode.gain.setValueAtTime(dynamicGain, now); 
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.04); 
    
    osc.connect(gainNode);
    gainNode.connect(filters.clock);
    osc.start(now);
    osc.stop(now + 0.05);
    
    timers.clock = setTimeout(spawnClockTick, 1000); 
}

// 4. 遠くの小鳥のさえずり（3倍ボリューム維持）[cite: 3]
function spawnBirdChirp() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    const duration = 0.6;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1350, now);
    osc.frequency.exponentialRampToValueAtTime(1750, now + 0.1);
    osc.frequency.linearRampToValueAtTime(1450, now + 0.3);
    osc.frequency.exponentialRampToValueAtTime(1850, now + 0.5);
    
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.35, now + 0.05); 
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    
    osc.connect(gainNode);
    gainNode.connect(filters.nature);
    osc.start(now);
    osc.stop(now + duration);
    
    timers.bird = setTimeout(spawnBirdChirp, 12000 + Math.random() * 8000);
}

// 5. 悠久の時報の鐘（ボーン、ボーン）
function spawnBellBong() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    
    function strike(delay) {
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(65.41, now + delay);
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(65.41 * 1.5, now + delay);
        
        gainNode.gain.setValueAtTime(0, now + delay);
        gainNode.gain.linearRampToValueAtTime(0.48, now + delay + 0.3); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + delay + 6.0);
        
        osc1.connect(gainNode);
        const overtoneGain = audioCtx.createGain();
        overtoneGain.gain.setValueAtTime(0.06, now + delay); 
        osc2.connect(overtoneGain);
        overtoneGain.connect(gainNode);
        
        gainNode.connect(filters.bell);
        osc1.start(now + delay);
        osc2.start(now + delay);
        osc1.stop(now + delay + 6.0);
        osc2.stop(now + delay + 6.0);
    }
    
    strike(0);
    strike(3.5);
    timers.bell = setTimeout(spawnBellBong, 35000 + Math.random() * 10000);
}

// 6. 航海図をめくる紙の音（ササッ…・3倍ボリューム維持）[cite: 3]
function spawnPaperSound() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.4;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.15, now + 0.1); 
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    
    noise.connect(gainNode);
    const paperFilter = audioCtx.createBiquadFilter();
    paperFilter.type = 'lowpass';
    paperFilter.frequency.setValueAtTime(250, now); 
    
    gainNode.connect(paperFilter);
    paperFilter.connect(mainGain);
    
    noise.start(now);
    timers.paper = setTimeout(spawnPaperSound, 32000 + Math.random() * 13000);
}

// 7. 暖炉ではぜる薪（パチッ…・3倍ボリューム維持）[cite: 3]
function spawnFireCrack() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(220 + Math.random() * 120, now);
    
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.27, now + 0.005); 
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.02);
    
    osc.connect(gainNode);
    osc.connect(filters.tick); 
    osc.start(now);
    osc.stop(now + 0.03);
    
    timers.fire = setTimeout(spawnFireCrack, 14000 + Math.random() * 8000);
}

// 8. 遠くの波打ち際（ザザー…・3倍ボリューム維持）[cite: 3]
function spawnSeaWave() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 7.0;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.08, now + 3.0); 
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 7.0); 
    
    noise.connect(gainNode);
    noise.connect(filters.sea);
    noise.start(now);
    
    timers.sea = setTimeout(spawnSeaWave, 45000 + Math.random() * 15000);
}

// 9. 気まぐれなガラス風鈴（チリリ…）[cite: 3]
function spawnWindChime() {
    if (!isPlaying) return;
    const now = audioCtx.currentTime;
    
    function ring(delay, freqOffset) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1450 + freqOffset, now + delay);
        
        gainNode.gain.setValueAtTime(0, now + delay);
        gainNode.gain.linearRampToValueAtTime(0.12, now + delay + 0.1); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + delay + 2.5);
        
        osc.connect(gainNode);
        gainNode.connect(filters.nature);
        osc.start(now + delay);
        osc.stop(now + delay + 2.5);
    }
    
    ring(0, 0);
    ring(0.3, 50); 
    timers.chime = setTimeout(spawnWindChime, 25000 + Math.random() * 15000);
}

// 10. 遠い異郷のバグパイプ・ドローン
function startPipeDrone() {
    const now = audioCtx.currentTime;
    const pipeNotes = [293.66, 440.00]; 
    
    pipeNotes.forEach((freq) => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.01, now + 5.0); 
        
        osc.connect(gainNode);
        gainNode.connect(filters.pipe);
        osc.start(now);
        pipeOscs.push(osc);
    });
}

// 緩慢なLFOによる空気のうねり（20秒周期）
let lfoTimer = null;
function pulseLFO() {
    if (!isPlaying) return;
    const currentNow = audioCtx.currentTime;
    const cutoff = 280 + Math.sin(currentNow * 0.08) * 40;
    filters.pad.frequency.setValueAtTime(cutoff, currentNow);
    lfoTimer = requestAnimationFrame(pulseLFO);
}

function playAmbient() {
    if (isPlaying) return;
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    isPlaying = true;
    startTime = Date.now(); // 再生開始時のタイムスタンプを記録[cite: 3]
    
    // 全自律シーケンスを起動
    spawnEtherealWave();
    spawnCrystalDrop();
    spawnClockTick(); 
    spawnBirdChirp();
    spawnBellBong();
    spawnPaperSound();
    spawnFireCrack();
    spawnSeaWave();
    spawnWindChime();
    startPipeDrone();
    pulseLFO();
}

// ==========================================
// 🛡️ 必須実装：親画面からの二大制御防衛窓口
// ==========================================

// 窓口A: メッセージキャッチ[cite: 3]
window.addEventListener('message', (e) => { 
    if (e.data === 'stop') { 
        stopBGM(); 
    } 
});

// 窓口B: 直接関数実行[cite: 3]
window.stopBGM = stopBGM;

function stopBGM() {
    if (!isPlaying) return;
    isPlaying = false;
    
    // 全タイマーを漏らさず解除[cite: 3]
    for (let key in timers) { clearTimeout(timers[key]); }
    cancelAnimationFrame(lfoTimer);
    
    pipeOscs.forEach(osc => { try { osc.stop(); } catch(e) {} });
    pipeOscs = [];
    
    // 進行中のオシレーターや残響音を即座かつ安全に完全消音処理[cite: 3]
    if (audioCtx) { audioCtx.suspend(); }
    audioCtx = null; 
}
</script>
</body>
</html>
