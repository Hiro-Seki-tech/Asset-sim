<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>「尽生」金枠の陣・時間拡張音響（連携用ステルスBGM）</title>
    <style>
        /* iframe内での完全非表示・ステルス仕様 */
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
    </style>
</head>
<body>

<script>
let audioCtx = null;
let isPlaying = false;
let sequenceTimer = null;
let lfoTimer = null;
let mainGain = null;
let padFilter = null;
let padOscs = [];

// さわやかで儚い白金のコード進行 (Cmaj9 -> Am9 -> Fmaj9 -> G6)
const etherealChords = [
    [261.63, 329.63, 392.00, 493.88], // Cmaj9
    [220.00, 261.63, 329.63, 392.00], // Am9
    [174.61, 218.27, 261.63, 349.23], // Fmaj9
    [196.00, 246.94, 293.66, 392.00]  // G6
];

let chordIndex = 0;

// 1. DOMContentLoaded 発火時に自動的に AudioContext を生成・再生開始
document.addEventListener('DOMContentLoaded', () => {
    playAmbient();
});

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    mainGain = audioCtx.createGain();
    mainGain.gain.setValueAtTime(0.35, audioCtx.currentTime); 
    
    // パッド持続音用ローパス（角を徹底的に丸める：300Hz制限）
    padFilter = audioCtx.createBiquadFilter();
    padFilter.type = 'lowpass';
    padFilter.frequency.setValueAtTime(300, audioCtx.currentTime);
    
    padFilter.connect(mainGain);
    mainGain.connect(audioCtx.destination);
}

// アタック・ゼロのシンセパッド（光のフェードイン・アウトの超緩慢ループ）
function spawnEtherealWave() {
    if (!isPlaying) return;

    const now = audioCtx.currentTime;
    const currentChord = etherealChords[chordIndex];
    
    const duration = 24.0; // 1つの和音の鳴動時間は24秒
    const attack = 5.5;    // 音が鳴る瞬間のアタックを「5.5秒」かけて超・緩慢にフェードイン
    const fadeOut = 12.0;   // 12秒かけて空気にとけるようにフェードアウト

    currentChord.forEach((freq) => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = 'sine'; // トゲの一切ない純粋サイン波
        osc.frequency.setValueAtTime(freq, now);
        
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.06, now + attack);
        gainNode.gain.setValueAtTime(0.06, now + duration - fadeOut);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
        
        osc.connect(gainNode);
        gainNode.connect(padFilter);
        
        osc.start(now);
        osc.stop(now + duration);
    });

    chordIndex = (chordIndex + 1) % etherealChords.length;
    
    // 次の波が来るまで20秒〜30秒の間隔（1/fゆらぎ）をあける超広域設計
    const nextInterval = 20000 + Math.random() * 10000;
    sequenceTimer = setTimeout(spawnEtherealWave, nextInterval);
}

// 緩慢なLFOによる空気のそよ風（18秒周期）
function pulseLFO() {
    if (!isPlaying) return;
    const currentNow = audioCtx.currentTime;
    const cutoff = 300 + Math.sin(currentNow * 0.1) * 50;
    padFilter.frequency.setValueAtTime(cutoff, currentNow);
    lfoTimer = requestAnimationFrame(pulseLFO);
}

function playAmbient() {
    if (isPlaying) return;
    
    if (!audioCtx) {
        initAudio();
    }
    
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    
    isPlaying = true;
    
    spawnEtherealWave();
    pulseLFO();
}

// ==========================================
// 🛡️ 必須実装：親画面からの二大制御防衛窓口
// ==========================================

// 窓口A: メッセージキャッチ（メッセージを受け取って消音・停止）
window.addEventListener('message', (e) => { 
    if (e.data === 'stop') { 
        stopBGM(); 
    } 
});

// 窓口B: 直接関数実行（親のJSスクリプトから window.stopBGM() で直接執行）
window.stopBGM = stopBGM;

function stopBGM() {
    if (!isPlaying) return;
    
    isPlaying = false;
    clearTimeout(sequenceTimer);
    cancelAnimationFrame(lfoTimer);
    
    // 進行中のオシレーターや残響音を即座かつ安全に完全消音処理
    if (audioCtx) {
        audioCtx.suspend();
    }
    audioCtx = null; // コンテキストを安全にクリア
}
</script>
</body>
</html>
