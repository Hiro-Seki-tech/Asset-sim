<!DOCTYPE html>
<html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 PLIP! Simple LINK Hub &amp; Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800;900&family=Noto+Sans+JP:wght=300;400;500;700;900&family=Cinzel:wght=500;700;900&family=Shippori+Mincho:wght=500;700;900&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background: #030712;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .cosmic-radial {
            background: radial-gradient(circle at 50% -20%, #111827 0%, #030712 80%);
        }

        @keyframes plipNobleFloatSVG { 
            0% { transform: translate3d(0, 0px, 0) rotate(0.001deg); } 
            50% { transform: translate3d(0, 3px, 0) rotate(0.001deg); } 
            100% { transform: translate3d(0, 0px, 0) rotate(0.001deg); } 
        }
        @keyframes plipRainbowTextSVG { 
            0% { fill: #ff0055; filter: drop-shadow(0 0 3px rgba(255, 0, 85, 0.5)); } 
            14% { fill: #ff5500; filter: drop-shadow(0 0 3px rgba(255, 85, 0, 0.5)); } 
            28% { fill: #ffcc00; filter: drop-shadow(0 0 3px rgba(255, 204, 0, 0.5)); } 
            42% { fill: #00ff66; filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.5)); } 
            50% { fill: #00ccff; filter: drop-shadow(0 0 3px rgba(0, 204, 255, 0.5)); } 
            70% { fill: #3333ff; filter: drop-shadow(0 0 3px rgba(51, 51, 255, 0.5)); } 
            84% { fill: #9900ff; filter: drop-shadow(0 0 3px rgba(153, 0, 255, 0.5)); } 
            100% { fill: #ff0055; filter: drop-shadow(0 0 3px rgba(255, 0, 85, 0.5)); } 
        }
        @keyframes plipBoltFlashSVG { 
            0%, 100% { opacity: 0.85; filter: drop-shadow(0 0 1px #fde047); } 
            50% { opacity: 1; filter: drop-shadow(0 0 5px #fde047); } 
        }
        
        .rainbow-bulb-svg { animation: plipRainbowTextSVG 7s linear infinite; }
        .flashing-bolt-svg { animation: plipBoltFlashSVG 1.5s infinite ease-in-out; }

        /* 📏 iframeおよび内部要素を枠内に歪みなく100%ジャストフィットさせるガードレールCSS */
        [id^="btn-frame-"] iframe,
        [id^="btn-frame-"] > div,
        [id^="btn-frame-"] div.w-full,
        [id^="btn-frame-"] svg {
            max-width: 100% !important;
            max-height: 100% !important;
            width: 100% !important;
            height: 100% !important;
            box-sizing: border-box !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
    </style>

        // =========================================================================
        // 💾 LocalStorage 自動セーブ＆ロード機構
        // =========================================================================
        function saveToLocalStorage() {
            try {
                localStorage.setItem('plip_master_data', JSON.stringify(plipMasterData));
            } catch (e) {
                console.error("LocalStorageへの保存に失敗しました:", e);
            }
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('plip_master_data');
                if (saved) {
                    plipMasterData = JSON.parse(saved);
                }
            } catch (e) {
                console.error("LocalStorageからの読み込みに失敗しました:", e);
            }

            // 💡 エクスポートされたHTMLファイル直開き用救済機構（Base64変数があればそこから優先復元）
            if (typeof plipEmbeddedBase64Data !== 'undefined' && plipEmbeddedBase64Data !== "") {
                try {
                    const decodedSign = decodeURIComponent(escape(atob(plipEmbeddedBase64Data)));
                    plipMasterData = JSON.parse(decodedSign);
                } catch (e) {
                    console.error("埋め込みBase64データのデコード・パースに失敗しました:", e);
                }
            }
        }

        // 📡 iframeから通知された内部の最新状態値をダイレクトに受け取る同期機構
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'PLIP_BUTTON_CLICK') {
                const targetTitle = decodeURIComponent(event.data.title);
                const innerState = parseInt(event.data.stateValue);
                forceSyncUniversalBurst(targetTitle, innerState);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage(); // 最初期にLocalStorageまたは埋め込みBase64からデータを復元

                    handleModalFile(e.dataTransfer.files[0], textarea);
                }
            };

                }

        function exportHTML(isForEdit) {
            const cleanDoc = document.implementation.createHTMLDocument(document.title);
            cleanDoc.documentElement.innerHTML = document.documentElement.outerHTML;

            const tabsContainer = cleanDoc.querySelector('#category-tabs-container');

            if (catModal) { catModal.className = "fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[250] hidden flex items-center justify-center p-4 shadow-2xl"; }

            const toastEl = cleanDoc.querySelector('#toast');
            if (toastEl) {
                toastEl.className = "fixed top-6 right-6 z-[300] transform translate-y-[-20px] opacity-0 pointer-events-none transition-all duration-300 bg-slate-900 border border-slate-800 text-slate-100 px-6 py-4 rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.6)] flex items-center gap-3 text-xs sm:text-sm font-semibold max-w-sm";
                const toastText = toastEl.querySelector('#toast-text');
                if (toastText) toastText.textContent = "通知メッセージ";
            }

            const scriptEl = cleanDoc.querySelector('script:not([src])');
            if (scriptEl) {
                let jsCode = scriptEl.textContent;
                
                // 💡 特殊文字、改行、クォーテーションの競合を永遠に排除するためにBase64形式へ変換
    const rawJson = JSON.stringify(plipMasterData);
                const base64Data = btoa(unescape(encodeURIComponent(rawJson)));
                
                // 💡 初回書き出し時も、2回目以降の古いBase64が残っている場合も、両方まとめて綺麗にマッチさせる正規表現に改良
                const regexData = /let\s+plipMasterData\s*=\s*\[[\s\S]*?\]\s*;(\s*const\s+plipEmbeddedBase64Data\s*=\s*".*?";)?/;
                
                // 初期配列変数は空にし、ファイルロード用のBase64文字列定数をインジェクション
                
                // 初期配列変数は空にし、ファイルロード用のBase64文字列定数をインジェクション
                let replacementCode = `let plipMasterData = [];\n        const plipEmbeddedBase64Data = "${base64Data}";`;
                jsCode = jsCode.replace(regexData, replacementCode);

                if (!isForEdit) {
                    const removeTargets = [
                        '#generator-control-bar', 
                        '#add-category-zone',     
                        '#card-modal',            
                        '#category-modal'         
                    ];
                    removeTargets.forEach(selector => {
                        const el = cleanDoc.querySelector(selector);
                        if (el) el.remove();
                    });
                }

                scriptEl.textContent = jsCode;
            }

            const finalHtml = '<!DOCTYPE html>\n' + cleanDoc.documentElement.outerHTML;

            const blob = new Blob([finalHtml], { type: "text/html;charset=utf-8;" });
            const link = document.createElement("a");
            const filename = isForEdit ? "LINK_HP_edit.html" : "LINK_HP_production.html";
            
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast(isForEdit ? "💾 編集機能を引き継いだHTMLを保存しました！" : "🚀 公開用のクリーンなHTMLを書き出しました！");

        function playMechanicalClick() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(850, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.03);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.03);
            } catch (e) {}
        }

        async function runAudioTheme(escapedTitleId, stateValue) {
            clearRunningAudio();
            
            const matchedCard = plipMasterData.flatMap(c => c.cards).find(card => encodeURIComponent(card.title).replace(/%/g, "") === escapedTitleId);
            let baseUrl = matchedCard ? matchedCard.url : '';
            if (baseUrl) {
                baseUrl = baseUrl.endsWith('/') ? baseUrl + 'music/' : baseUrl + '/music/';
                if(matchedCard.url.endsWith('.html') || matchedCard.url.endsWith('.php')) {
                    baseUrl = matchedCard.url.substring(0, matchedCard.url.lastIndexOf('/') + 1) + 'music/';
                }
            }

            const cleanLabel = matchedCard ? matchedCard.title : "作品";

            if (stateValue === 0) {
                showToast(`🥇 【${cleanLabel}】 BGM再生テスト開始`);
                activeBgmIframe = document.createElement('iframe');
                activeBgmIframe.src = baseUrl + 'BGM.html';
                activeBgmIframe.style.display = 'none';
                activeBgmIframe.setAttribute('allow', 'autoplay');
                document.body.appendChild(activeBgmIframe);
            } else if (stateValue === 1) {
                showToast(`🎵 【${cleanLabel}】 歌抽選テスト (song.mp4)`);
                activeAudioElement = document.createElement('audio');
                activeAudioElement.src = baseUrl + 'song.mp4';
                activeAudioElement.style.display = 'none';
                activeAudioElement.volume = 0.5;
                document.body.appendChild(activeAudioElement);
                activeAudioElement.play().catch(() => {
                    showToast("⚠️ 自動再生が制限されました。もう一度ボタンを押してください。");
                });
            } else if (stateValue === 2) {
                showToast(`🤫 ミュート状態 (赤枠)`);
            }
        }
		
		// 💡 【追加】ご意見モーダルの開閉・外側クリックで閉じるJavaScript
        
        // ご意見モーダルを開く
        function openFeedbackModal() {
            playMechanicalClick();
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-modal-content');
            document.getElementById('feedback-content').value = ''; // フォーム初期化
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        // ご意見モーダルを閉じる
        function closeFeedbackModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // スプレッドシートへ送信する通信ロジック（CORSチェック完全回避版）
        function submitFeedbackForm() {
            const msg = document.getElementById('feedback-content').value.trim();
            if (!msg) {
                showToast('メッセージ内容が空です。');
                return;
            }

            // 送信ボタンの連打を防ぐため一時的にロック
            const sendBtn = document.getElementById('send-feedback-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = '転送中...';
            sendBtn.className = 'bg-slate-800 text-slate-500 px-5 py-2 rounded-xl text-xs font-bold cursor-not-allowed';

            // 画面サイズを取得
            const screenSize = `${window.innerWidth}x${window.innerHeight}`;

            // GAS（Google Apps Script）のウェブアプリURL
            const googleGasUrl = 'https://script.google.com/macros/s/AKfycbyfeSVzcBb8BeZgzXwFgN5iA8iFautRGB3R4TYYGzfBSZXW3HoGqJpss-P2TbCzOcVsSQ/exec';

            // mode: 'no-cors' と Content-Type: 'text/plain' によりセキュリティチェックを回避
            fetch(googleGasUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ message: msg, screenSize: screenSize })
            })
            .then(response => {
                // no-corsモードではレスポンス内容がブラウザに隠蔽されるため、疎通完了＝成功として処理
                showToast("🚀 ご意見を転送しました！");
                closeFeedbackModal();
            })
            .catch(error => {
                console.error('Error:', error);
                showToast("🚀 お疲れさまでした。");
            })
            .finally(() => {
                // ボタンの状態を元に戻す
                sendBtn.disabled = false;
                sendBtn.textContent = '意見を送信する';
                sendBtn.className = 'bg-cyan-600 hover:bg-cyan-500 text-white font-black px-5 py-2 rounded-xl text-xs transition-all shadow-lg shadow-cyan-600/20';
            });
        }

        // 📱 モーダルの外側（暗い背景）をタップ・クリックした時にもポップアップを閉じる処理
        document.addEventListener('click', (event) => {
            const modal = document.getElementById('feedback-modal');
            if (modal && !modal.classList.contains('hidden') && event.target === modal) {
                closeFeedbackModal();
            }
        });
		
    </script>
